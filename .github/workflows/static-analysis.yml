name: Static Analysis

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax lint
        run: composer lint:php

      - name: PHPStan
        run: composer lint:phpstan

      - name: PHPCS
        run: composer lint:phpcs

  equipment-checks:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('.wp-env.json') != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start wp-env
        run: npx @wordpress/env start

      - name: Run Equipment Exchange deterministic checks
        run: npx @wordpress/env run cli wp eval-file scripts/equipment-exchange-checks.php

      - name: Stop wp-env
        if: always()
        run: npx @wordpress/env stop
