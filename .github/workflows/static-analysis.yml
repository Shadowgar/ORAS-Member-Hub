name: Static Analysis

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax lint
        run: composer lint:php

      - name: PHPStan
        run: composer lint:phpstan

      - name: PHPCS
        run: composer lint:phpcs

  equipment-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect wp-env config
        id: wp_env
        run: |
          if [ -f .wp-env.json ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.wp_env.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start wp-env
        if: steps.wp_env.outputs.enabled == 'true'
        run: npx @wordpress/env start

      - name: Run Equipment Exchange deterministic checks
        if: steps.wp_env.outputs.enabled == 'true'
        run: npx @wordpress/env run cli wp eval-file scripts/equipment-exchange-checks.php

      - name: Stop wp-env
        if: always() && steps.wp_env.outputs.enabled == 'true'
        run: npx @wordpress/env stop
